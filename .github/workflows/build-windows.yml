name: Build Windows EXE

on:
  push:
    paths:
      - 'discord.py'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pyinstaller
      
      - name: Build EXE
        run: |
          pyinstaller --onefile --console --name DiscordInjector discord.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: DiscordInjector-Windows
          path: dist/DiscordInjector.exe
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Discord Token Injector ${{ github.ref_name }}
          files: dist/DiscordInjector.exe
