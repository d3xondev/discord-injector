name: Build Windows EXE

on:
  push:
    paths:
      - 'discord.py'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pyinstaller
      
      - name: Build EXE
        run: |
          pyinstaller --onefile --console --name DiscordInjector discord.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiscordInjector-Windows
          path: dist/DiscordInjector.exe
          retention-days: 30
